# Optional: local PostgreSQL only. Or use a host-installed Postgres or a cloud URL — set DATABASE_URL in apps/api/.env.
services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym
    volumes:
      - gym_pg_data:/var/lib/postgresql/data

volumes:
  gym_pg_data:
