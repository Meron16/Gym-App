services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym
    volumes:
      - gym_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gym-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - gym_redis_data:/data

volumes:
  gym_pg_data:
  gym_redis_data:
